services:

  redis:
    image: redis:alpine
    container_name: openpoll_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: openpoll_backend
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      # Host port 5000 is commonly occupied on Windows, so map the API to 5001 locally.
      - "5001:5000"

volumes:
  redis_data: