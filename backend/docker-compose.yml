version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ai_poll_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: ai_poll_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data: # This ensures your poll data isn't deleted if the container stops